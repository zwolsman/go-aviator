apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

# The host key file is NOT tracked in git (.gitignore).
# Before running `kustomize build` or `kubectl apply -k`, generate the key:
#
#   ssh-keygen -t ed25519 -f ../../keys/host_ed25519 -N ""
#
# Or copy your existing key into keys/host_ed25519.
# Kustomize will read the file and create the Secret automatically.
#secretGenerator:
#  - name: go-aviator-host-key
#    files:
#      - host_ed25519=../../keys/host_ed25519
#    options:
#      disableNameSuffixHash: true

# Database URL secret must be created out-of-band:
#   kubectl create secret generic go-aviator-db \
#     --from-literal=url='postgres://user:pass@host:5432/dbname?sslmode=require'
